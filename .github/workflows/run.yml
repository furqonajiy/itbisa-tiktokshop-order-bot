# GitHub Actions workflow for the ITBisa Shopee Order Bot.
#
# This workflow runs the Python script every day on a schedule
# based on Jakarta time (WIB = UTC+7).
#
# Schedule (Jakarta time -> UTC):
#   05:00 WIB = 22:00 UTC (previous UTC day)
#   10:00 WIB = 03:00 UTC
#   14:00 WIB = 07:00 UTC
#   17:00 WIB = 10:00 UTC
#
# State file management:
#   This workflow uses TWO branches:
#     - main: source code, protected by branch rules requiring PRs.
#     - bot-state: runtime state files (processed_orders.json, shopee_tokens.json).
#   This separation lets the bot commit state freely without touching main.
#   See README "State Management" section for setup details.

name: Run Shopee Order Bot

on:
  # STEP 1: Run on a cron schedule. GitHub Actions cron uses UTC.
  schedule:
    - cron: "0 22,3,7,10 * * *"

  # STEP 2: Also allow manual triggering from the Actions tab. Useful for
  # testing or for catching up after a missed run.
  workflow_dispatch:

jobs:
  process-orders:
    runs-on: ubuntu-latest

    # STEP 3: Allow this job to push commits to the bot-state branch.
    permissions:
      contents: write

    steps:
      # STEP 4: Check out the main branch to get the latest code.
      - name: Check out code from main
        uses: actions/checkout@v5
        with:
          ref: main

      # STEP 5: Pull the latest state files from the bot-state branch.
      # We do this after the main checkout so that data/ files come from
      # bot-state, while everything else (code, scripts, workflow) stays from main.
      - name: Pull state files from bot-state branch
        run: |
          git fetch origin bot-state || true

          if git rev-parse --verify origin/bot-state >/dev/null 2>&1; then
            # Copy the data/ files from bot-state into our working directory.
            git checkout origin/bot-state -- data/processed_orders.json || echo "  No processed_orders.json on bot-state yet, will create on first commit"
            git checkout origin/bot-state -- data/shopee_tokens.json || echo "  No shopee_tokens.json on bot-state yet, will create on first commit"
          else
            echo "  bot-state branch does not exist yet; using data/ files from main for bootstrap"
          fi

      # STEP 6: Install Python.
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      # STEP 7: Install poppler, which pdf2image needs to render PDFs.
      - name: Install poppler
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      # STEP 8: Install the Python dependencies.
      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # STEP 9: Run the bot. Secrets come from GitHub Actions Secrets.
      - name: Run order processor
        env:
          SHOPEE_PARTNER_ID: ${{ secrets.SHOPEE_PARTNER_ID }}
          SHOPEE_PARTNER_KEY: ${{ secrets.SHOPEE_PARTNER_KEY }}
          SHOPEE_SHOP_ID: ${{ secrets.SHOPEE_SHOP_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m src.main

      # STEP 10: Commit the updated state files to the bot-state branch.
      # We save the updated state to a temp location, switch to bot-state,
      # restore the files, and push. This keeps bot-state minimal (only
      # data/ files, no code) and works whether bot-state exists or not.
      - name: Commit updated state to bot-state
        run: |
          git config user.name "itbisa-bot"
          git config user.email "bot@itbisa.local"

          # Save the updated state files to a temporary location outside
          # the working tree, because the next step will switch branches.
          mkdir -p /tmp/bot-state-data
          cp data/processed_orders.json /tmp/bot-state-data/ 2>/dev/null || true
          cp data/shopee_tokens.json /tmp/bot-state-data/ 2>/dev/null || true

          # Switch to bot-state branch (create from scratch if it does not exist).
          git fetch origin bot-state || true
          if git rev-parse --verify origin/bot-state >/dev/null 2>&1; then
            git checkout -B bot-state origin/bot-state
          else
            # First-ever run: create bot-state as an orphan branch with no history.
            git checkout --orphan bot-state
            git rm -rf . > /dev/null 2>&1 || true
          fi

          # Copy the saved state files into the bot-state working tree.
          mkdir -p data
          cp /tmp/bot-state-data/processed_orders.json data/ 2>/dev/null || true
          cp /tmp/bot-state-data/shopee_tokens.json data/ 2>/dev/null || true

          # Stage and commit only if something changed.
          git add data/processed_orders.json data/shopee_tokens.json
          git diff --staged --quiet || git commit -m "Update state [skip ci]"

          # Push bot-state. This branch is NOT protected by branch rules.
          git push origin bot-state
