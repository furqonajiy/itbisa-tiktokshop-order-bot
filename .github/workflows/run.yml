# GitHub Actions workflow for the ITBisa TikTok Shop Order Bot.
#
# This workflow runs the Python script only when triggered manually or by the
# Telegram Worker through workflow_dispatch.
#
# State file management:
#   This workflow uses TWO branches:
#     - main: source code.
#     - bot-state: runtime state/token files only
#       (processed_orders.json, tiktokshop_tokens.json).
#   This separation lets the bot commit state freely without touching main.
#   See README "Runtime state branch" section for setup details.

name: Run TikTok Shop Order Bot

on:
  # Allow manual triggering from the Actions tab and dispatching
  # from the Cloudflare Telegram Worker.
  workflow_dispatch:

jobs:
  process-orders:
    runs-on: ubuntu-latest

    concurrency:
      group: bot-state-${{ github.repository }}
      cancel-in-progress: false

    # STEP 1: Allow this job to push commits to the bot-state branch.
    permissions:
      contents: write

    steps:
      # STEP 2: Check out the main branch to get the latest code.
      - name: Check out code from main
        uses: actions/checkout@v5
        with:
          ref: main

      # STEP 3: Pull the latest state files from the bot-state branch.
      # We do this after the main checkout so that data/ files come from
      # bot-state, while everything else (code, scripts, workflow) stays from main.
      - name: Pull state files from bot-state branch
        run: |
          git fetch origin bot-state || true

          if git rev-parse --verify origin/bot-state >/dev/null 2>&1; then
            # Copy the data/ files from bot-state into our working directory.
            git checkout origin/bot-state -- data/processed_orders.json || echo "  No processed_orders.json on bot-state yet, will create on first commit"
            git checkout origin/bot-state -- data/tiktokshop_tokens.json || echo "  No tiktokshop_tokens.json on bot-state yet, will create on first commit"
          else
            echo "  bot-state branch does not exist yet; using data/ files from main for bootstrap"
          fi

      # STEP 4: Install Python.
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      # STEP 5: Install poppler, which pdf2image needs to render PDFs.
      - name: Install poppler
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      # STEP 6: Install the Python dependencies.
      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # STEP 7: Run the bot. Secrets come from GitHub Actions Secrets.
      # STOCK_DISPATCH_TOKEN is a PAT with actions:write on
      # itbisa-shop-stock-bot so the bot can fire /stock_balance for each
      # base SKU shipped this run.
      - name: Run order processor
        env:
          TIKTOKSHOP_APP_KEY: ${{ secrets.TIKTOKSHOP_APP_KEY }}
          TIKTOKSHOP_APP_SECRET: ${{ secrets.TIKTOKSHOP_APP_SECRET }}
          TIKTOKSHOP_SHOP_ID: ${{ secrets.TIKTOKSHOP_SHOP_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          STOCK_DISPATCH_TOKEN: ${{ secrets.STOCK_DISPATCH_TOKEN }}
        run: python -m src.main

      # STEP 8: Commit the updated state files to the bot-state branch.
      # We save the updated state to a temp location, switch to bot-state,
      # restore the files, and push. This keeps bot-state minimal (only
      # data/ files, no code) and works whether bot-state exists or not.
      - name: Commit updated state to bot-state
        if: always()
        run: |
          git config user.name "itbisa-bot"
          git config user.email "bot@itbisa.local"

          # Save the updated state files to a temporary location outside
          # the working tree, because the next step will switch branches.
          mkdir -p /tmp/bot-state-data
          cp data/processed_orders.json /tmp/bot-state-data/ 2>/dev/null || true
          cp data/tiktokshop_tokens.json /tmp/bot-state-data/ 2>/dev/null || true

          # Switch to bot-state branch (create from scratch if it does not exist).
          git fetch origin bot-state || true
          if git rev-parse --verify origin/bot-state >/dev/null 2>&1; then
            git checkout -B bot-state origin/bot-state
          else
            # First-ever run: create bot-state as an orphan branch with no history.
            git checkout --orphan bot-state
            git rm -rf . > /dev/null 2>&1 || true
          fi

          # Copy the saved state files into the bot-state working tree.
          mkdir -p data
          cp /tmp/bot-state-data/processed_orders.json data/ 2>/dev/null || true
          cp /tmp/bot-state-data/tiktokshop_tokens.json data/ 2>/dev/null || true

          # Stage and commit only if something changed.
          git add data/processed_orders.json data/tiktokshop_tokens.json
          git diff --staged --quiet || git commit -m "Update state [skip ci]"

          # Push bot-state. This branch is NOT protected by branch rules.
          git push origin bot-state